<div class="row">
    <div class="col-12">
        <div class="page-title-box d-sm-flex align-items-center justify-content-between">
            <h4 class="mb-sm-0">Commandes Reçues</h4>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-12">
        <div class="card">
            <div class="card-body">
                @if (isLoading) {
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Chargement...</span>
                        </div>
                    </div>
                } @else if (orders.length === 0) {
                    <div class="text-center py-5">
                        <div class="avatar-lg mx-auto mb-4">
                            <div class="avatar-title bg-light text-primary rounded-circle fs-24">
                                <i class="ri-shopping-cart-2-line"></i>
                            </div>
                        </div>
                        <h5>Aucune commande enregistrée</h5>
                        <p class="text-muted">Vos transactions s'afficheront ici.</p>
                    </div>
                } @else {
                    <div class="table-responsive">
                        <table class="table align-middle table-nowrap mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col">Référence</th>
                                    <th scope="col">Statut</th>
                                    <th scope="col">Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                @for (order of orders; track order.idCommande) {
                                    <tr>
                                        <td>#{{order.idCommande}}</td>
                                        <td>
                                            <span class="badge bg-success-subtle text-success">{{order.statut}}</span>
                                        </td>
                                        <td>{{order.total}} TND</td>
                                    </tr>
                                }
                            </tbody>
                        </table>
                    </div>
                }
            </div>
        </div>
    </div>
</div>
